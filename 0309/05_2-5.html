<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            border: 2px solid blue;
            padding: 10px;
            margin: 10px;
        }
        .old {
            background: red;
            color: white;
            padding: 5px;
            margin: 3px;
        }
        .new {
            background: green;
            color: white;
            padding: 5px;
            margin: 3px;
        }
    </style>
</head>
<body>
    <div id="container" class="container">
        <p class="old" id="target1">교체될 자식 1</p>
        <p class="old" id="target2">교체될 자식 2</p>
        <p class="old" id="target3">교체될 자식 3</p>
    </div>

    <button onclick="replaceFirst()">첫 번째 교체</button>
    <button onclick="replaceSecond()">두 번째 교체</button>
    <button onclick="replaceThird()">세 번째 교체</button>

    <script>
        function replaceFirst() {
            const reEl = document.getElementById("target1");
            const newEl = document.createElement("div");
            newEl.textContent = "새로운 첫 번째 교체됨";
            newEl.className = "new";
            container.replaceChild(newEl, reEl)
        }

        function replaceSecond() {
            const reEl = document.getElementById("target2");
            const newEl = document.createElement("span");
            newEl.textContent = "새로운 두 번째 교체됨";
            newEl.className = "new";
            container.replaceChild(newEl, reEl)
        }

        function replaceThird() {
            const reEl = document.getElementById("target3");
            const newEl = document.createElement("h3");
            newEl.textContent = "새로운 세 번째 교체됨";
            newEl.className = "new";
            container.replaceChild(newEl, reEl)
        }
    </script>
</body>
</html>
