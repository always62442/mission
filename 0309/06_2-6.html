<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .item {
            background: lightblue;
            padding: 10px;
            margin: 5px;
            border: 1px solid blue;
        }
        .container {
            border: 2px solid black;
            padding: 15px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="target1">삭제할 항목 1</div>
        <div class="item" id="target2">삭제할 항목 2</div>
        <div class="item" id="target3">삭제할 항목 3</div>
        <div class="item" id="target4">삭제할 항목 4</div>
    </div>

    <button onclick="removeFirst()">첫 번째 삭제</button>
    <button onclick="removeSecond()">두 번째 삭제</button>
    <button onclick="removeThird()">세 번째 삭제</button>
    <button onclick="removeForth()">네 번째 삭제</button>

    <script>
        function removeFirst() {
            document.getElementById("target1").remove();
        }
        function removeSecond() {
            document.getElementById("target2").remove();
        }
        function removeThird() {
            document.getElementById("target3").remove();
        }
        function removeForth() {
            document.getElementById("target4").remove();
        }
    </script>
</body>
</html>
