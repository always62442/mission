<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox 레이아웃 실습</title>
    <style>
        /* 기본 스타일 초기화 및 설정 */
        body {
            margin: 0;
            display: flex;
            flex-direction: column; /* 세로 방향으로 배치 (Header - Content - Footer) */
            height: 100vh; /* 화면 꽉 차게 설정 */
            font-family: sans-serif;
        }

        div, header, footer, section, nav, aside {
            border: 1px solid #ddd;
            padding: 15px;
        }

        /* 1. 상단과 하단 (고정 높이 스타일) */
        header, footer {
            background-color: #222;
            color: white;
            height: 25px;
        }

        /* 2. 중앙 영역 (가장 중요!) */
        .content-wrapper {
            display: flex; /* 가로 방향으로 배치 (Nav - Main - Aside) */
            flex-direction: row; 
            flex: 1; /* 상단/하단을 제외한 남은 수직 공간을 모두 차지함 */
            gap: 5px;
        }

        /* 3. 내부 아이템들 */
        nav, aside {
            width: 150px; /* 고정폭 */
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        main {
            flex: 1; /* 남는 가로 공간 꽉 채우기 */
            
            /* 여기서부터 박스 스타일 */
            background-color: white;    /* 배경색 */
            border: 1px solid #ddd;     /* 박스 테두리 */
            padding: 10px;  
            border-radius: 5px;            /* 박스 내부와 콘텐츠(글자) 사이의 간격 */
            
            /* 박스 안의 글자들을 왼쪽 정렬 */
            text-align: left;           
            
            /* 만약 main 내부 요소들을 세로로 정렬하고 싶다면 flex를 또 써도 됩니다 */
            display: flex;
            flex-direction: column;
            gap: 10px; /* 내부 요소들(h2, div, p) 사이의 간격 */
        }

        /* 텍스트 스타일 */
        h2 { margin-top: 0; }
        ul { padding-left: 20px; }
        .hint { color: #888; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>

    <header>머리글(Header)</header>

    <section class="content-wrapper">
        <nav>
            <strong>네비게이션(Nav)</strong>
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Contact</li>
            </ul>
        </nav>

        <main>
            <h2>메인 콘텐츠(Main)</h2>
            
            <div class="inner-box">양옆은 고정폭, 가운데는 가변폭!</div>
            <p class="hint">Hint: 가운데 영역은 flex: 1로 남는 공간을 차지합니다.</p>
        </main>

        <style>
            /* 메인 내부 박스 스타일링 */
            .inner-box {
            /* 1. 박스 내부의 여백 (위, 오른쪽, 아래, 왼쪽 모두 동일하게) */
                padding: 15px; 

            /* 2. 텍스트 왼쪽 정렬 (기본값이지만 명시적으로 지정 가능) */
                text-align: left;

            /* (참고) 이미지와 비슷한 느낌을 내기 위한 추가 스타일 */
                background-color: #f8f9ff;
                border: 1px dashed #cbd5e0;
                width: 100%; /* 부모인 main 너비에 맞춤 */
                box-sizing: border-box; /* 패딩이 추가되어도 박스 전체 크기가 커지지 않게 함 */
            }

            .hint {
                color: #888;
                font-size: 0.9em;
            }
        </style>

        <aside>
            <strong>사이드바(Aside)</strong>
            <p>공지/광고/프로필 등</p>
        </aside>
    </section>

    <footer>바닥글(Footer)</footer>

</body>
</html>
