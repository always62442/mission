<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {

          padding: 16px;
        }

        .card {
          width: 160px;
          height: 240px;
          border-radius: 4px;

          overflow: hidden;
          position: relative;
          background: #ffffff;
        }

        /* 298x298 이미지 */
        .image {
          width: 564px;
          height: 1007px;

          background-image: url('images/08_mission.jpg');
          background-size: cover;
          background-position: center;
          position: absolute;
          top: -471px;
          left: -221px;
        }

        /* 160x240 갈색 영역 */
        .content {
          width: 160px;
          height: 68px;
          
          background-color: #CA785C;
          position: absolute;

          display: flex;
          flex-direction: column;
          margin-top: 172px;
          gap: 8px;
        }

        .content p {
          width: 83px;
          height: 19px;

          margin: 0;
          font-size: 16px;
          font-weight: 700;
          color: #ffffff;
          margin: 8px;
        }

        .profile {
          display: flex;
          
        }
        .profile p1 {
          margin: 0;
          font-size: 14px;
          font-weight: 700;
          color: #ffffff;
          margin-left: 8px;
        }
        .profile p2 {
          margin: 0;
          font-size: 14px;
          font-weight: 700;
          color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="image"></div>
        <div class="content">
            <p>인테리어란?</p>
            <div class="profile">
              <p1>김작가</p1> <p2>2024.01.01</p2>
            </div>
        </div>
    </div>

</body>
<html>
