<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
          background: #f5f5f5;
          padding: 40px;
        }

        .card {
          width: 160px;
          height: 240px;
          border-radius: 16px;
          overflow: hidden;
          position: relative;
          background: #ffffff;
        }

        /* 298x298 이미지 */
        .image {
          width: 564px;
          height: 1007px;
          background-image: url('images/08_mission.jpg');
          background-size: cover;
          background-position: center;
          position: absolute;
          top: -471px;
          left: -221px;
        }

        /* 160x240 갈색 영역 */
        .content {
          width: 160px;
          height: 240px;
          background-color: #CA785C;
          position: absolute;
          top: 16px;
          left: 16px;

          display: flex;
          align-items: center;
          padding-left: 16px;
        }

        .content p {
          margin: 0;
          font-size: 16px;
          font-weight: 700;
          color: #ffffff;
        }

        .content p1 {
          margin: 0;
          font-size: 14px;
          font-weight: 700;
          color: #ffffff;
        }

        .content p2 {
          margin: 0;
          font-size: 14px;
          font-weight: 700;
          color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="image"></div>
        <div class="content">
            <p>안녕하세요!</p>
            <p1>김작가</p1> <p2>2024.01.01</p2>
        </div>
    </div>

</body>
<html>
