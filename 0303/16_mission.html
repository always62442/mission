<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
    <title>로그인 페이지</title>
</head>
<body>
    <style>

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            width: 336px;
            height: 148px;

            top: 16px;
            left: 16px;
            gap: 8px;

            border-radius: 8px;
            border: 1px solid #C2C2C2;
        }

        .p1 {
            width: 288px;
            height: 19px;

            font-family: 'Inter';
            font-weight: 400;
            font-size: 16px;
            text-align: center;

            display: flex;
            align-items: center;
        }

        .button {
            width: 288px;
            height: 48px;

            border-radius: 8px;
            background-color: #17B75E;

            display: flex;
            justify-content: center;
            align-items: center;
        }
        .p2 {
            width: 56px;
            height: 24px;

            font-family: 'Inter';
            font-weight: 700;
            font-style: bold;
            font-size: 20px;

            display: flex;
            align-items: center;

            color: #FFFFFF;
            text-align: center;
        }

        .click {
            display: flex;
            flex-direction: row;

            width: 235px;
            height: 17px;
            
        }

        .id, .pwd, .new {
            font-family: 'Inter';
            font-weight: 400;
            font-size: 14px;

            height: 17px;
            text-align: center;
            
            display: flex;
            align-items: center;
        }
        .id {
            width: 69px;
        }
        .pwd {
            width: 82px;
        }
        .new {
            width: 52px;
        }

        .box {
            width: 0;
            height: 16px;
            border: 1px solid #D3D5D7;
            margin-left: 7px;
            margin-right: 7px;
        }

    </style>

    <div class="container">
        <div class="p1">사이트를 더 안전하고 편리하게 이용하세요.</div>
        <div class="button">
            <div class="p2">로그인</div>
        </div>
        <div class="click">
        <div class="id">아이디 찾기</div>
        <div class="box"></div>
        <div class="pwd">비밀번호 찾기</div>
        <div class="box"></div>
        <div class="new">회원가입</div>
        </div>
    </div>
</body>
</html>
