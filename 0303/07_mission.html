<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
    <title>Document</title>

    <style>
        body {
          padding: 16px;
        }

        .card {
          width: 278px;
          height: 160px;
          border-radius: 8px;

          overflow: hidden;
          position: relative;
        }

        /* 298x298 이미지 */
        .image {
          width: 298px;
          height: 298px;

          background-image: url('images/07_mission.jpg');
          background-size: cover;
          background-position: center;
          position: absolute;

          top: -89px;
          left: -20px;
        }

        /* 278x40 갈색 영역 */
        .content {
          width: 278px;
          height: 40px;

          background-color: #B97A5B;
          position: absolute;

          top: 120px;
          left: 0;

          display: flex;
          align-items: center; /*세로 정렬*/
        }

        .content p {
          width: 79px;
          height: 19px;

          font-family: "Inter";
          font-size: 16px;
          font-weight: 700;
          color: #ffffff;
          
          margin-top: 10px;
          margin-left: 16px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="image"></div>
        <div class="content">
            <p>안녕하세요!</p>
        </div>
    </div>

</body>
<html>
