<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <style>
        .home {
            padding: 16px;
        }
        .box {
            width: 250px;
            height: 150px;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            background: #FFB9B9;
        }
        
        .container{
            width: 250px;
            height: 75px;
            border: 1px solid #FFB9B9;
            box-sizing: border-box;
            padding-left: 8px;
            padding-top: 8px;
        }

        .p1 {
            width: 132px;
            height: 15px;

            font-family: "Inter";
            font-weight: 400;
            font-size: 12px;

            display: flex;
            justify-content: center; /* 가로 중앙 */
            align-items: center; /* 세로 중앙 */
        }

        .home2 {
            width: 66px;
            height: 40px;
            padding-top: 8px;
            padding-bottom: 8px;
            gap: 8px;

            display: flex;
            align-items: center;
        }
        .dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #D9D9D9;
        }
        .p2 {
            width: 34px;
            height: 15px;

            font-family: "Inter";
            font-weight: 400;
            font-size: 12px;

            display: flex;
            align-items: center; /* 세로 중앙 */
        }

    </style>

    <div class="home">
        <div class="box"></div>
        <div class="container">
            <div class="p1">안녕하세요. 텍스트입니다.</div>
            <div class="home2">
                <div class="dot"></div> 
                <div class="p2">휴양조</div>
            </div>
        </div>
    </div>
</body>
</html>
