<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        .image {
            width: 320px;
            height: 320px;
            background-position: -105px -297px;

            display: flex;
            flex-wrap: wrap;

        }

        }
        .dot2{
            width: 32px;
            height: 32px;
            border-radius: 999px;
            background-color: #92F8FF;
            margin: 16px;
        }
        .dot3{
            width: 32px;
            height: 32px;
            border-radius: 999px;
            background-color: #FF9292;
            margin: 16px;
        }
    </style>
</head>
<body>
    <div class="image">
        <div class="p">인테리어 디자인</div>

        <div class="dot2"></div>

</html>
