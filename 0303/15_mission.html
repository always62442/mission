<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
    <title>로그인 페이지</title>
</head>
<body>
    <style>
        .title {
            width: 67px;
            height: 29px;
            margin: 16px;   /*박스와의 간격*/

            font-family: 'Inter';
            font-weight: 700;
            font-style: bold;
            font-size: 24px;
            display: flex;
            align-items: center;
        }

        .id {
            display: flex;
            flex-direction: column;

            width: 278px;
            height: 67px;
            margin: 16px;
            top: 69px;
            gap: 8px;
        }
        .pwd {
            display: flex;
            flex-direction: column;

            width: 278px;
            height: 67px;
            margin: 16px;
            top: 160px;
            gap: 8px;
        }
        .p {
            width: 59px;
            height: 19px;

            font-family: 'Inter';
            font-weight: 400;
            font-size: 16px;

            display: flex;
            align-items: center;
        }
        .textbox {
            width: 278px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid #C3C3C3;
        }

        .button {
            width: 278px;
            height: 48px;
            margin: 16px;
            top: 251px;
            border-radius: 8px;
            background-color: #17B75E;

            display: flex;
            justify-content: center;
            align-items: center;
        }
        .p1 {
            font-family: 'Inter';
            font-weight: 700;
            font-size: 20px;

            display: flex;
            align-items: center;
            color: #FFFFFF;
        }

    </style>

    <div class="title">로그인</div>
    <div class="id">
        <div class="p">아이디</div>
        <div class="textbox"></div>
    </div>
    <div class="pwd">
        <div class="p">비밀번호</div>
        <div class="textbox"></div>
    </div>
    <div class="button">
        <div class="p1">로그인</div>
    </div>
</body>
</html>
