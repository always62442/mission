<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }

        .container {
            border: 2px solid #ddd;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
        }

        .box {
            padding: 10px;
            margin: 8px 0;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
        }

        .special {
            background-color: #fff3cd;
            border-color: #ffeaa7;
        }

        ul li {
            padding: 5px;
            margin: 3px 0;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #0056b3;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>제목 영역</h1>

        <div class="box">첫 번째 박스</div>
        <div class="box special">두 번째 박스 (특별)</div>
        <div class="box">세 번째 박스</div>
    </div>

    
    <div class="container">
        <ul>
            <li>첫 번째 목록</li>
            <li class="special">두 번째 목록 (특별)</li>
            <li>세 번째 목록</li>
            <li>네 번째 목록</li>
        </ul>
    </div>
    
    <div class="container">
        <input type="text" placeholder="텍스트 입력" />
        <input type="email" placeholder="이메일 입력" />
        <button onclick="Input()">일반 버튼</button>
    </div>

    <button onclick="selectID()">ID로 선택</button>
    <button onclick="selectClass()">클래스로 선택</button>
    <button onclick="selectTag()">태그로 선택</button>
    <button onclick="selectSpecialClass()">특별 클래스 선택</button>
    <button onclick="selectFirst()">첫 번째만 선택</button>
    <button onclick="selectBox()">모든 박스 선택</button>
    <button onclick="selectMultiple()">복합 선택자</button>
    <button onclick="selectField()">입력 필드 선택</button>

</body>
</html>
