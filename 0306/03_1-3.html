<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>클래스명 노드 취득 예제</title>
    <style>

        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }

        .box {
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        .highlight {
            background-color: #ffffcc;
            border-color: #ffcc00;
        }

        .item {
            padding: 8px;
            margin: 5px 0;
            background-color: #e9ecef;
            border-left: 3px solid #007bff;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

    </style>
</head>
<body>

    <div class="box">첫 번째 박스</div>
    <div class="box">두 번째 박스</div>
    <div class="box highlight">세 번째 박스 (하이라이트)</div>

    <div class="item">첫 번째 아이템</div>
    <div class="item">두 번째 아이템</div>
    <div class="item">세 번째 아이템</div>
    <div class="item">네 번째 아이템</div>

    <p class="highlight">하이라이트된 문단입니다.</p>

    <button onclick="changeAllBoxes()">모든 박스 선택</button>
    <button onclick="changeAllItems()">모든 아이템 선택</button>
    <button onclick="changeHighlights()">하이라이트 요소들 선택</button>

    <script>
        // 1. 모든 박스 변경 
        const changeAllBoxes = () => {
            const boxes = document.querySelectorAll(".box");

            boxes.forEach((box, i) => {
                box.innerHTML = `선택된 박스 ${i + 1}`;
                box.style.backgroundColor = "#ffcccc";
                box.style.color = "#333";
            });
        };

        // 2. 모든 아이템 변경
        const changeAllItems = () => {
            const items = document.querySelectorAll(".item");

            items.forEach((item, i) => {
                item.innerHTML = `새로운 아이템 ${i + 1}`;
                item.style.backgroundColor = "#ccffcc";
                item.style.borderLeftColor = "#28a745";
            });
        };

        // 3. 하이라이트 요소 변경 (기존 내용 유지하며 추가)
        const changeHighlights = () => {
            const highlights = document.querySelectorAll(".highlight");

            highlights.forEach(el => {
                el.style.backgroundColor = "#ffdddd";
                el.style.fontWeight = "bold";
                el.innerHTML += " (수정됨)";
            });
            
        };
    </script>
</body>
</html>
