<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시맨틱 태그 실습 미션</title>
</head>
<body>
    <header> <!--페이지 상단 영역-->
        <h1>나의 첫 블로그</h1>
    </header>

    <aside> <!--페이지 사이드 메뉴 영역(보조 컨텐츠, 네비게이션)-->
        <!-- 블로그 메뉴 -->
        <ul>
            <li><a href="#">홈</a></li>
            <li><a href="#">프로필</a></li>
            <li><a href="#">게시글</a></li>
            <li><a href="#">연락처</a></li>
        </ul>
    </aside>

    <main> <!--페이지 핵심 내용 영역-->
        <article>
            <h2>첫 번째 게시글</h2>

            <h3>프로그래밍 시작하기</h3>
            <p>프로그래밍을 시작하는 것은 새로운 언어를 배우는 것과 같습니다. 
                   처음에는 어려울 수 있지만, 기초부터 차근차근 배워나가면 됩니다.</p>

            <h3>HTML 기초 배우기</h3>
            <p>HTML은 웹 페이지의 구조를 만드는 마크업 언어입니다. 
                   시맨틱 태그를 사용하면 웹 페이지의 구조를 더 명확하게 표현할 수 있습니다.</p>
        </article>

        <section> <!--같은 주제끼리 묶는 영역-->
            <h3>카테고리</h3>
            <ul>
                <li>프로그래밍 기초</li>
                <li>HTML/CSS 학습</li>
                <li>웹 개발 일지</li>
            </ul>
        </section>
    </main>

    <footer> <!--페이지 맨 아래 영역-->
        <!--저작권/연락처-->
        <p>© 2026 나의 첫 블로그</p>
    </footer>
</body>
</html>
